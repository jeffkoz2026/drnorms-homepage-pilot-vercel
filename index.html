<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Norm’s</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial;
  background:#111;
  color:#f5f1ea;
}

.container {max-width:1200px;margin:auto;padding:40px 20px;}

h1 {
  font-size:72px;
  line-height:0.95;
  margin:20px 0;
}

p {color:#bbb;font-size:18px;}

.hero {display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;}

.btn {
  padding:14px 22px;
  border-radius:30px;
  border:1px solid #333;
  display:inline-block;
  margin-right:10px;
}

.primary {background:#f5f1ea;color:#111;font-weight:600;}

.cards {display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}

.card {
  border:1px solid #333;
  border-radius:20px;
  overflow:hidden;
}

.card img {height:200px;object-fit:cover;}

.card div {padding:20px;}

.section {margin-top:80px;}

.products {display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}

.products img {height:140px;object-fit:cover;border-radius:12px;}

@media(max-width:900px){
  .hero,.cards,.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<div>
<h1>Artisan Edibles<br>Targeted Wellness<br>Max™</h1>
<p>Delicious • Effective • Precisely dosed</p>

<div style="margin-top:20px;">
<span class="btn primary">Explore</span>
<span class="btn">Ask Dr. Norm</span>
</div>
</div>

<img src="https://images.unsplash.com/photo-1604908176997-4312b5e1d6b1?q=80&w=1200" />
</div>

<div class="section">
<h2>Shop</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1606787366850-de6330128bfc?q=80&w=800">
<div>
<h3>Edibles</h3>
<p>Cookies, brownies, crispy rice bars, gummies</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584367369853-7a7d8c2e6f4d?q=80&w=800">
<div>
<h3>Wellness</h3>
<p>Sleep, relief, and balance</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1590080877777-0a6b5d0c2b1c?q=80&w=800">
<div>
<h3>MAX</h3>
<p>High dose products for experienced users</p>
</div>
</div>

</div>
</div>

<div class="section">
<h2>Product Lines</h2>

<div class="products">
<img src="https://images.unsplash.com/photo-1606787366850-de6330128bfc?q=80&w=400">
<img src="https://images.unsplash.com/photo-1617196038435-3f5b2c8b0c1f?q=80&w=400">
<img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60?q=80&w=400">
<img src="https://images.unsplash.com/photo-1587049352846-4a222e784d38?q=80&w=400">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=400">
</div>

</div>

</div>

</body>
</html>
