<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Norm’s</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial;
  background:#0b0b0c;
  color:#f5f1ea;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  font-size:72px;
  line-height:0.95;
  margin:0 0 20px;
}

p {
  color:#bbb;
  font-size:18px;
}

.hero {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
}

.hero-art {
  height:420px;
  border-radius:24px;
  border:1px solid #2a2a2f;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,214,153,.15), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(190,230,255,.12), transparent 30%),
    linear-gradient(135deg,#1a1a1d,#0f0f10);
}

.btn {
  padding:14px 22px;
  border-radius:30px;
  border:1px solid #333;
  display:inline-block;
  margin-right:10px;
}

.primary {
  background:#f5f1ea;
  color:#111;
  font-weight:600;
}

.section {
  margin-top:80px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:30px;
}

.card {
  border:1px solid #2a2a2f;
  border-radius:20px;
  padding:24px;
  background:#141416;
}

.products {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  margin-top:30px;
}

.product {
  height:120px;
  border-radius:14px;
  background:#18181b;
  border:1px solid #2a2a2f;
}

@media(max-width:900px){
  .hero,.cards,.products{grid-template-columns:1fr;}
  h1{font-size:44px;}
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<div>
<h1>Artisan Edibles<br>Targeted Wellness<br>Max™</h1>
<p>Delicious • Effective • Precisely dosed</p>

<div style="margin-top:20px;">
<span class="btn primary">Explore</span>
<span class="btn">Ask Dr. Norm</span>
</div>
</div>

<div class="hero-art"></div>
</div>

<div class="section">
<h2>Shop</h2>

<div class="cards">
<div class="card">
<h3>Edibles</h3>
<p>Cookies, brownies, crispy rice bars, gummies</p>
</div>

<div class="card">
<h3>Wellness</h3>
<p>Sleep, relief, and balance</p>
</div>

<div class="card">
<h3>MAX</h3>
<p>High dose products for experienced users</p>
</div>
</div>
</div>

<div class="section">
<h2>Product Lines</h2>

<div class="products">
<div class="product"></div>
<div class="product"></div>
<div class="product"></div>
<div class="product"></div>
<div class="product"></div>
</div>

</div>

</div>

</body>
</html>
